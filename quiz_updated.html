let index = 0;
let score = 0;


function shuffleAnswers(q){
 let arr = q.a.map((text, index) => ({
   text: text,
   correct: index === q.correct
 }));

 // Fisher-Yates shuffle
 for (let i = arr.length - 1; i > 0; i--) {
   let j = Math.floor(Math.random() * (i + 1));
   [arr[i], arr[j]] = [arr[j], arr[i]];
 }

 q.a = arr.map(item => item.text);
 q.correct = arr.findIndex(item => item.correct);
}

function showQ(){
 let q = questions[index];

 // shuffle answers each time
 shuffleAnswers(q);
 document.getElementById("progress").innerText = (index+1)+"/"+questions.length;
 document.getElementById("question").innerText = q.q;

 let html="";
 q.a.forEach((a,i)=>{
   html+=`<button onclick="check(${i})">${a}</button><br>`;
 });
 document.getElementById("answers").innerHTML=html;
}

function check(i){
 let q=questions[index];
 let btns=document.querySelectorAll("#answers button");
 if(i===q.correct){
  btns[i].classList.add("correct");
  score++;
 }else{
  btns[i].classList.add("wrong");
  btns[q.correct].classList.add("correct");
 }
 btns.forEach(b=>b.disabled=true);
}

function nextQ(){
 index++;
 if(index<questions.length) showQ();
 else alert("Score: "+score+"/"+questions.length);
}

function nav(){
 let html="";
 questions.forEach((q,i)=>{
   html+=`<button onclick="go(${i})">${i+1}</button>`;
 });
 document.getElementById("nav").innerHTML=html;
}

function go(i){
 index=i;
 showQ();
}



let userAnswers = [];
let answered = [];

function showQ(){
 let q = questions[index];
 document.getElementById("question").innerText = (index+1)+". "+q.q;
 document.getElementById("answers").innerHTML="";
 document.getElementById("result").innerText="";

 q.a.forEach((ans,i)=>{
   let btn=document.createElement("button");
   btn.innerText=ans;

   if(answered[index]){
     btn.disabled=true;
     if(i===q.correct) btn.classList.add("correct");
     if(i===userAnswers[index] && i!==q.correct) btn.classList.add("wrong");
   }

   btn.onclick=()=>{
     if(answered[index]) return;

     userAnswers[index]=i;
     answered[index]=true;

     if(i===q.correct){
       score++;
       btn.classList.add("correct");
       document.getElementById("result").innerText="Correct!";
     }else{
       btn.classList.add("wrong");
       document.getElementById("result").innerText="Wrong!";
     }

     showQ();
   };

   document.getElementById("answers").appendChild(btn);
 });

 document.getElementById("progress").innerText = (index+1)+"/"+questions.length;
}

function nextQ(){
 if(index < questions.length-1){
   index++;
   showQ();
 }else{
   showResult();
 }
}

function showResult(){
 let correct = score;
 let wrong = questions.length - score;
 let percent = Math.round((correct / questions.length)*100);

 document.getElementById("question").innerText = "Test finished!";
 document.getElementById("answers").innerHTML = "";
 document.getElementById("result").innerHTML = 
   "Correct: "+correct+"<br>Wrong: "+wrong+"<br>Percent: "+percent+"%";
}

function nav(){
 let navDiv = document.getElementById("nav");
 navDiv.innerHTML="";
 for(let i=0;i<questions.length;i++){
   let b=document.createElement("button");
   b.innerText=i+1;
   b.onclick=()=>{ index=i; showQ(); };
   navDiv.appendChild(b);
 }
}
